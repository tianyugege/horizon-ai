name: Daily Horizon Summary (Disabled)

on:
  workflow_dispatch:

concurrency:
  group: daily-horizon-summary
  cancel-in-progress: false

jobs:
  daily-summary:
    if: ${{ false }}  # Project closed: keep workflow disabled
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write  # Needed to commit changes
  
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --frozen

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        run: uv run horizon --hours 24

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: horizon-debug-${{ github.run_number }}
          path: |
            data/debug
            data/summaries
          if-no-files-found: warn

      - name: Set current date as environment variable
        if: success()
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
